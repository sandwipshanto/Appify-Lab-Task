name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: ${{ secrets.CI_BUILD_DATABASE_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
  UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
  UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: buddyscript/package-lock.json
      - run: npm ci
        working-directory: buddyscript
      - run: npx prisma generate
        working-directory: buddyscript
      - run: npx eslint .
        working-directory: buddyscript
      - run: npx tsc --noEmit
        working-directory: buddyscript

  unit-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.CI_UNIT_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: buddyscript/package-lock.json
      - run: npm ci
        working-directory: buddyscript
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: buddyscript
      - name: Run Prisma migrations on test database
        run: npx prisma migrate deploy
        working-directory: buddyscript
      - name: Run unit and API integration tests
        run: |
          npx next build
          npx next start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx vitest run
        working-directory: buddyscript

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    env:
      DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: buddyscript/package-lock.json
      - run: npm ci
        working-directory: buddyscript
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: buddyscript
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: buddyscript
      - name: Build application
        run: npx next build
        working-directory: buddyscript
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: buddyscript
      - name: Start server and run E2E tests
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test
        working-directory: buddyscript

  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: buddyscript/package-lock.json
      - run: npm ci
        working-directory: buddyscript
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: buddyscript
      - name: Production build verification
        run: npx next build
        working-directory: buddyscript
